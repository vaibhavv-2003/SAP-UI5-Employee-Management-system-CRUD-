<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>App Title</title>
    <style>
        html, body, body > div, #container, #container-uiarea {
            height: 100%;
        }
    </style>
    <script
        id="sap-ui-bootstrap"
        src="resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-resource-roots='{
            "empmgmt": "./"
        }'

        // This does the job of sap.ui.getCore().attachInit() and starts the app by loading the component
        data-sap-ui-on-init="module:sap/ui/core/ComponentSupport"
        data-sap-ui-compat-version="edge"
        data-sap-ui-async="true"

        // for the clickjacking issue,This is required to allow the app to be embedded in an iframe on a different domain.
        //  where an attacker overlays your app
        data-sap-ui-frame-options="trusted"
    ></script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content">
    <div
        data-sap-ui-component
        // This is my app container, the component will be rendered inside this div because app is the containera
        data-name="empmgmt"
        data-id="container"
        data-settings='{"id" : "empmgmt"}'
        data-handle-validation="true"
    ></div>
</body>
</html>
